[Keyboard]
# Key names use SDL2 scancode names.
# Common names: Space, Left Shift, Right Shift, Left Ctrl, Right Ctrl,
#   Left Alt, Right Alt, Return, Escape, Tab, Backspace, Delete,
#   A-Z, 0-9, F1-F12, Up, Down, Left, Right, etc.
# Full list: https://wiki.libsdl.org/SDL2/SDL_Scancode

# Buttons
A = Space
B = Left Shift
X = X
Y = Y
Start = Return
Z = Z
L = Q
R = E

# Main Stick
Stick_Up = W
Stick_Down = S
Stick_Left = A
Stick_Right = D

# C-Stick (Camera)
CStick_Up = Up
CStick_Down = Down
CStick_Left = Left
CStick_Right = Right

# D-Pad
DPad_Up = I
DPad_Down = K
DPad_Left = J
DPad_Right = L
